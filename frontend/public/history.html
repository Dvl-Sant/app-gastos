<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>AppGastos - Historial</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#1772da",
            "background-light": "#f6f7f8",
            "background-dark": "#111821",
            "surface": "#ffffff",
            "border-subtle": "#e2e8f0",
            "success": "#10b981",
            "danger": "#ef4444",
            "accent-red": "#ef4444",
          },
          fontFamily: { "display": ["Inter"] },
          borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      min-height: max(884px, 100dvh);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body class="bg-background-light text-slate-900 font-display min-h-screen flex flex-col">
  <header
    class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-border-subtle px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div
        class="size-10 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20 overflow-hidden">
        <i data-lucide="clock" class="text-primary w-5 h-5"></i>
      </div>
      <div>
        <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Detalles</p>
        <h1 class="text-base font-bold text-slate-900">Historial de Pagos</h1>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex flex-col items-end">
        <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Hoy es</p>
        <h2 class="text-sm font-bold text-slate-900 capitalize" id="current-date-display"></h2>
      </div>
      <a href="/index.html"
        class="text-slate-500 font-bold bg-slate-100 px-4 py-2 rounded-xl transition-colors text-sm flex items-center gap-1 hover:bg-slate-200">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver
      </a>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto px-4 py-6 space-y-6 hide-scrollbar relative z-0" id="history-container">
  </main>

  <script src="/app.js?v=6"></script>
</body>

</html>
